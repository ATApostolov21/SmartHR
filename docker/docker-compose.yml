version: '3.8'

services:
  # HR Analytics Dashboard (Local)
  dashboard:
    build: .
    container_name: hr_analytics_local
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data # Persist local database/history
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - IS_DOCKER=true

# No extra volumes needed (using bind mount for data)
